<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PAVOI Digest">
<meta name="theme-color" content="#2e4042">
<title>PAVOI Inspire · Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
/*
  position:fixed + inset:0 gives body a GUARANTEED definite height on Safari iOS.
  height:100% alone is unreliable because the Safari URL bar causes the viewport
  height to be ambiguous. Fixed positioning resolves against the visual viewport.
*/
body{position:fixed;top:0;right:0;bottom:0;left:0;overflow:hidden;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e6e7e5;color:#282828;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr{flex-shrink:0;background:#2e4042;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:46px;box-shadow:0 1px 0 rgba(169,189,182,.2)}
.hdr-left{display:flex;flex-direction:column;gap:1px}
.hdr-brand{color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase}
.hdr-label{color:#a9bdb6;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.8px;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:10px}
.name-sel{background:#3a5053;color:#FFFFFF;border:1.5px solid #a9bdb6;border-radius:2px;padding:6px 10px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.5px;outline:none;cursor:pointer;-webkit-appearance:none;max-width:140px}
.btn-refresh{background:transparent;border:1.5px solid #4a6669;color:#a9bdb6;border-radius:2px;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-refresh:active{opacity:.6}
.btn-refresh.spinning{animation:spin 1s linear infinite}

/* ── WEEK BAR ── */
.week-bar{flex-shrink:0;background:#282828;display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:42px}
.week-bar.hidden{display:none}
.week-btn{background:transparent;border:none;color:#6b7b79;font-size:22px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:2px;font-family:inherit}
.week-btn:active{background:#3a3a3a;color:#FFFFFF}
.week-center{text-align:center;flex:1}
.week-label{color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.3px}
.week-sub{color:#6b7b79;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase}

/* ── TABS ── */
.tabs{flex-shrink:0;background:#FFFFFF;display:flex;border-bottom:2px solid #e6e7e5}
.tab{flex:1;height:40px;border:none;background:transparent;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#a9bdb6;cursor:pointer;position:relative;transition:color .2s}
.tab.active{color:#2e4042}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#2e4042}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:#c0392b;color:#FFFFFF;border-radius:2px;padding:1px 6px;font-size:9px;font-weight:700;letter-spacing:.5px;margin-left:5px;min-width:16px}
.tab-badge.sage{background:#a9bdb6}

/* ── VIEWS ── */
.view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;min-height:0}
.view.active{display:flex;flex-direction:column}

/* ── VOTE VIEW ── */
.vote-counter{flex-shrink:0;text-align:center;padding:4px 0 2px;color:#a9bdb6;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase}

/*
  Card arena: minimal padding so card fills the screen edge-to-edge (Tinder style).
*/
.card-arena{
  flex:1;
  position:relative;
  overflow:hidden;
  min-height:0;
}

/* Stack: absolutely fills the arena — no max-width so it truly edge-to-edge */
.card-stack{
  position:absolute;
  inset:0;
}

/* ── SWIPE CARDS ── */
.swipe-card{
  border-radius:0;
  overflow:hidden;
  background:#1a2a2b;
  cursor:grab;
  user-select:none;-webkit-user-select:none;
  will-change:transform;
  touch-action:none;
}
.swipe-card:active{cursor:grabbing}

/* Top card fills the full stack */
.swipe-card.top{position:absolute;inset:0;z-index:10}

/* Behind cards: subtle peek */
.swipe-card.behind-1{position:absolute;inset:0;transform:scale(.97) translateY(5px);z-index:1;pointer-events:none}
.swipe-card.behind-2{position:absolute;inset:0;transform:scale(.94) translateY(10px);z-index:0;pointer-events:none}

/* Image: contain so full jewelry product is always visible */
.sc-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center center;display:block;background:#1a2a2b}
.sc-img-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;opacity:.25}

/* Text overlay anchored to bottom with deep gradient scrim */
.sc-body{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:48px 20px 20px;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.55) 55%,transparent 100%);
}
.sc-body.has-img{background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.55) 55%,transparent 100%)}

.sc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sc-who{color:rgba(255,255,255,.75);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.sc-date{color:rgba(255,255,255,.45);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.5px}
.sc-note{font-family:'DM Sans',sans-serif;font-size:20px;line-height:1.35;color:#FFFFFF;font-weight:700;margin-bottom:10px}
.sc-link{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(169,189,182,.9);text-decoration:none;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.sc-link:hover{opacity:.75}

/* YES / NO overlays */
.ov-yes,.ov-no{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:0;pointer-events:none;transition:opacity .05s;border-radius:0}
.ov-yes{background:rgba(46,64,66,.28)}
.ov-no{background:rgba(192,57,43,.28)}

/* Vote buttons */
.vote-btns{flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:28px;padding:8px 0 max(14px,env(safe-area-inset-bottom))}
.vbtn{width:72px;height:72px;border-radius:36px;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(46,64,66,.22);transition:transform .15s;flex-shrink:0}
.vbtn:active{transform:scale(.88)}
.vbtn-no{background:#FFFFFF;border:2.5px solid #c0392b}
.vbtn-skip{background:#FFFFFF;border:2px solid #cdd0ce;width:52px;height:52px;font-size:18px;border-radius:26px}
.vbtn-yes{background:#FFFFFF;border:2.5px solid #2e4042}

/* All done / empty states */
.all-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:14px}
.all-done-eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#a9bdb6}
.all-done-ttl{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:600;color:#2e4042;line-height:1.3}
.all-done-sub{font-family:'DM Sans',sans-serif;font-size:14px;color:#6b7b79;line-height:1.6}
.btn-results{background:#2e4042;color:#FFFFFF;border:none;border-radius:2px;padding:14px 28px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-results:active{opacity:.75}
.center-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:12px}
.center-icon{font-size:40px;opacity:.5}
.center-eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#a9bdb6}
.center-ttl{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;color:#2e4042}
.center-sub{font-family:'DM Sans',sans-serif;font-size:14px;color:#6b7b79;line-height:1.6;max-width:300px}

/* ── RESULTS SUB-TABS ── */
.sub-tabs{flex-shrink:0;background:#FFFFFF;display:flex;border-bottom:2px solid #e6e7e5}
.sub-tab{flex:1;height:40px;border:none;background:transparent;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#a9bdb6;cursor:pointer;position:relative;transition:color .2s;white-space:nowrap;padding:0 4px}
.sub-tab.active{color:#2e4042}
.sub-tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#2e4042}

/* Results grid: 2 cols mobile, portrait images */
.results-grid{flex-shrink:0;padding:0 10px 16px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-content:start}

.result-card{background:#FFFFFF;border-radius:10px;overflow:hidden;box-shadow:0 2px 14px rgba(46,64,66,.1);cursor:pointer;transition:transform .15s}
.result-card:active{transform:scale(.96)}

/* 4:5 portrait image box — reliable across all browsers */
.rc-img-box{position:relative;width:100%;padding-top:125%;background:#dde0de;overflow:hidden}
.rc-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.rc-img-ph{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.35}

/* Text-only card: brand color bg with note displayed in the image area */
.rc-img-box.text-card{background:#2e4042}
.rc-text-note{position:absolute;inset:0;padding:14px;display:flex;align-items:center;justify-content:center}
.rc-text-note span{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;line-height:1.5;color:rgba(255,255,255,.88);overflow:hidden;display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;text-align:center}

.rc-body{padding:9px 10px 11px}
.rc-badge{display:inline-flex;align-items:center;height:18px;border-radius:2px;padding:0 7px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.badge-go{background:#e8f2ee;color:#2e4042}
.badge-discuss{background:#fdf4e1;color:#7a6535}
.badge-archive{background:#edeeed;color:#6b7b79}
.badge-pending{background:#e6e7e5;color:#a9bdb6}
.rc-note{font-family:'DM Sans',sans-serif;font-size:12px;color:#282828;line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:5px}
.rc-who{font-family:'Space Mono',monospace;font-size:9px;color:#a9bdb6;letter-spacing:.3px}
.rc-votes{display:flex;align-items:center;gap:3px;margin-top:6px;flex-wrap:wrap}
.vote-dot{width:7px;height:7px;border-radius:1px}
.vote-dot.yes{background:#2e4042}
.vote-dot.no{background:#c0392b}
.vote-dot.empty{background:#cdd0ce}
.rc-pct{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#a9bdb6;margin-left:3px}

/* ── DETAIL MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(46,64,66,.6);z-index:500;display:none;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
.modal-bg.on{display:flex}
.modal{background:#FFFFFF;border-radius:14px 14px 2px 2px;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;padding:24px;padding-bottom:max(24px,env(safe-area-inset-bottom));position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:#e6e7e5;border:none;width:30px;height:30px;border-radius:15px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;color:#6b7b79}
.modal-img{width:100%;border-radius:8px;margin-bottom:16px;cursor:zoom-in}
.modal-badge{margin-bottom:12px;display:inline-flex}
.modal-note{font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.6;font-weight:400;color:#282828;margin-bottom:12px}
.modal-meta{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.5px;color:#a9bdb6;margin-bottom:18px}
.modal-meta a{color:#2e4042;text-decoration:none}
.modal-votes-ttl{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#6b7b79;margin-bottom:10px}
.vote-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #e6e7e5}
.vote-row:last-child{border-bottom:none}
.vote-name{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#282828}
.vote-val{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:2px;text-transform:uppercase}
.vote-val.yes{background:#e8f2ee;color:#2e4042}
.vote-val.no{background:#fce8e5;color:#c0392b}
.vote-val.empty{background:#e6e7e5;color:#a9bdb6}
.modal-bar{margin-top:16px;height:3px;background:#e6e7e5;border-radius:0}
.modal-bar-fill{height:100%;background:#2e4042;border-radius:0;transition:width .5s}

/* ── EXPORT BAR ── */
.export-bar{flex-shrink:0;position:sticky;bottom:0;z-index:10;background:#FFFFFF;border-top:1px solid #e6e7e5;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.export-bar::-webkit-scrollbar{display:none}
.exp-btn{flex-shrink:0;height:36px;border-radius:2px;border:1.5px solid #cdd0ce;background:#FFFFFF;color:#2e4042;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:0 12px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s}
.exp-btn:active{background:#e6e7e5}

/* ── FLASH + TOAST ── */
.copy-flash{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2e4042;color:#FFFFFF;padding:10px 20px;border-radius:2px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:0;transition:opacity .25s;z-index:600;pointer-events:none;white-space:nowrap}
.copy-flash.on{opacity:1}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-10px);background:#282828;color:#FFFFFF;padding:10px 20px;border-radius:2px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;opacity:0;transition:opacity .25s,transform .25s;z-index:800;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DESKTOP ── */
@media(min-width:600px){
  .results-grid{grid-template-columns:repeat(3,1fr);gap:12px;padding:0 14px 16px}
}
@media(min-width:900px){
  .results-grid{grid-template-columns:repeat(4,1fr);gap:14px}
}
@media(min-width:1200px){
  .results-grid{grid-template-columns:repeat(5,1fr)}
}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.94);align-items:center;justify-content:center;cursor:zoom-out;overflow:auto}
#lightbox.on{display:flex}
#lightboxImg{max-width:94vw;max-height:94vh;object-fit:contain;border-radius:2px;cursor:default}
#lightboxClose{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;width:40px;height:40px;border-radius:50%;cursor:pointer;z-index:10000;display:flex;align-items:center;justify-content:center}
.rc-img,.modal-img{cursor:zoom-in}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-brand">PAVOI</div>
    <div class="hdr-label">Inspire &middot; Digest</div>
  </div>
  <div class="hdr-right">
    <button class="btn-refresh" id="btnRefresh" onclick="loadData()" title="Refresh">&#8635;</button>
    <select class="name-sel" id="nameSelect" onchange="onNameChange()">
      <option value="">Your name&hellip;</option>
    </select>
  </div>
</header>

<div class="week-bar">
  <button class="week-btn" onclick="changeWeek(-1)">&#8249;</button>
  <div class="week-center">
    <div class="week-label" id="weekLabel">Loading&hellip;</div>
    <div class="week-sub" id="weekSub"></div>
  </div>
  <button class="week-btn" onclick="changeWeek(+1)" id="btnWeekFwd">&#8250;</button>
</div>

<div class="tabs">
  <button class="tab active" id="tabVote" onclick="switchTab('vote')">Vote<span class="tab-badge" id="voteBadge">0</span></button>
  <button class="tab" id="tabResults" onclick="switchTab('results')">Results<span class="tab-badge sage" id="resultsBadge">0</span></button>
</div>

<div class="view active" id="viewVote" style="overflow:hidden">
  <div id="voteInner" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0"></div>
</div>

<div class="view" id="viewResults">
  <div class="sub-tabs">
    <button class="sub-tab active" data-filter="all"     onclick="setFilter('all')">All</button>
    <button class="sub-tab"        data-filter="go"      onclick="setFilter('go')">Go</button>
    <button class="sub-tab"        data-filter="discuss" onclick="setFilter('discuss')">Discuss</button>
    <button class="sub-tab"        data-filter="archive" onclick="setFilter('archive')">Archive</button>
    <button class="sub-tab"        data-filter="pending" onclick="setFilter('pending')">Pending</button>
  </div>
  <div class="results-grid" id="resultsGrid"></div>
  <div class="export-bar">
    <button class="exp-btn" onclick="exportSlack()">&#128172;&nbsp;Slack Digest</button>
    <button class="exp-btn" onclick="exportFigma()">&#128208;&nbsp;Figma JSON</button>
    <button class="exp-btn" onclick="exportClaudePrompt()">&#10022;&nbsp;Claude Prompt</button>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modalBg').classList.remove('on')">&#10005;</button>
    <div id="modalContent"></div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <button id="lightboxClose" onclick="closeLightbox()">&#10005;</button>
  <img id="lightboxImg" src="" alt="Full size">
</div>

<div class="copy-flash" id="copyFlash"></div>
<div class="toast" id="toast"></div>

<script>
var CONFIG = {
  THRESHOLD_GO: 70, THRESHOLD_DISCUSS: 40,
  TEAM: ['Hannah Samlin','Rita Lopes','Tal Masica','Shynade Austin','Tara Ganon','Kelly Hallinan'],
  COL_I: {TS:0,URL:1,SAVED_BY:2,SAVE_DATE:3,NOTE:4,IMAGE_URL:5},
  COL_V: {TS:0,VOTER:1,ITEM_ID:2,VOTE:3,WEEK:4}
};

var allItems=[],allVotes=[],weekOffset=0,loadError=null,localVotes={},activeFilter='all',cardQueue=[];
var swipeState={active:false,startX:0,startY:0,curX:0,curY:0};
var _toastTimer,_copyFlashTimer,SWIPE_THRESHOLD=80;

/* ── WEEK HELPERS ── */
function getISOWeek(d){var dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);var w1=new Date(dt.getFullYear(),0,4);return dt.getFullYear()+'-W'+String(1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7)).padStart(2,'0')}
function getWeekBounds(o){var n=new Date(),dow=(n.getDay()+6)%7,mon=new Date(n);mon.setDate(n.getDate()-dow+o*7);mon.setHours(0,0,0,0);var sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);return{mon:mon,sun:sun,week:getISOWeek(mon)}}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtShort(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function parseDate(s){if(!s)return new Date(0);var d=new Date(s);if(!isNaN(d))return d;var m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})[,\s]+(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)?/i);if(m){var h=parseInt(m[4]);if(m[7]&&m[7].toUpperCase()==='PM'&&h<12)h+=12;if(m[7]&&m[7].toUpperCase()==='AM'&&h===12)h=0;return new Date(parseInt(m[3]),parseInt(m[1])-1,parseInt(m[2]),h,parseInt(m[5]),parseInt(m[6]))}return new Date(0)}
function gc(r,i){return(r&&r[i])?String(r[i]).trim():''}

/* ── INIT ── */
function init(){
  document.querySelector('.week-bar').classList.add('hidden');
  var sel=document.getElementById('nameSelect');
  CONFIG.TEAM.forEach(function(n){var o=document.createElement('option');o.value=o.textContent=n;sel.appendChild(o)});
  var saved=localStorage.getItem('pavoi_name');
  if(saved&&CONFIG.TEAM.indexOf(saved)>=0)sel.value=saved;
  try{localVotes=JSON.parse(localStorage.getItem('pavoi_votes')||'{}')}catch(e){localVotes={}}
  updateWeekDisplay();loadData();
}
function onNameChange(){var v=document.getElementById('nameSelect').value;if(v)localStorage.setItem('pavoi_name',v);buildVoteQueue();renderVoteView();renderResultsGrid()}

/* ── DATA via google.script.run ── */
function loadData(){
  var btn=document.getElementById('btnRefresh');
  btn.classList.add('spinning');loadError=null;
  document.getElementById('voteInner').innerHTML='<div class="center-msg"><div class="center-icon" style="animation:spin 1.2s linear infinite;display:inline-block">&#8635;</div><div class="center-eyebrow">Loading</div><div class="center-ttl">Fetching captures&hellip;</div></div>';
  var cData=null,vData=null,cErr=null,vErr=null,pending=2;
  function done(){
    if(--pending>0)return;
    if(cData){allItems=cData.slice(1).filter(function(r){return r.length>3}).map(function(r,i){return{id:gc(r,0)||'item-'+i,sourceUrl:gc(r,1),savedBy:gc(r,2),saveDate:gc(r,3),note:gc(r,4),imageUrl:gc(r,5)}}).filter(function(it){return it.note})}
    else{loadError=cErr||'Could not load captures'}
    if(vData){allVotes=vData.slice(1).filter(function(r){return r.length>3}).map(function(r){return{voter:gc(r,1),itemId:gc(r,2),vote:gc(r,3).toUpperCase(),week:gc(r,4)}})}
    btn.classList.remove('spinning');
    buildVoteQueue();renderVoteView();renderResultsGrid();updateBadges();
  }
  google.script.run.withSuccessHandler(function(d){cData=d;done()}).withFailureHandler(function(e){cErr=e?e.message||String(e):'Error';done()}).getCaptures();
  google.script.run.withSuccessHandler(function(d){vData=d;done()}).withFailureHandler(function(e){vErr=e?e.message||String(e):'Error';done()}).getVotes();
}

/* ── WEEK ── */
function updateWeekDisplay(){var b=getWeekBounds(weekOffset);document.getElementById('weekLabel').textContent=fmtShort(b.mon)+' \u2013 '+fmtShort(b.sun);document.getElementById('weekSub').textContent=b.week;var fw=document.getElementById('btnWeekFwd');fw.disabled=weekOffset>=0;fw.style.opacity=weekOffset>=0?'.3':'1'}
function changeWeek(d){if(weekOffset+d>0)return;weekOffset+=d;updateWeekDisplay();buildVoteQueue();renderVoteView();renderResultsGrid();updateBadges()}
function getWeekItems(){var b=getWeekBounds(weekOffset);return allItems.filter(function(it){var cands=[it.id,it.saveDate].filter(Boolean);var d=cands.reduce(function(best,s){var p=parseDate(s);return(!isNaN(p)&&p>new Date(0))?p:best},new Date(0));return d>=b.mon&&d<=b.sun})}

/* ── VOTES ── */
function getVoteMap(){var b=getWeekBounds(weekOffset),map={};allVotes.filter(function(v){return v.week===b.week}).forEach(function(v){if(!map[v.itemId])map[v.itemId]={};map[v.itemId][v.voter]=v.vote});var user=document.getElementById('nameSelect').value,lv=localVotes[b.week]||{};Object.keys(lv).forEach(function(id){var entry=lv[id];var voteVal=typeof entry==='object'?entry.vote:entry;var voter=typeof entry==='object'?entry.voter:user;if(!map[id])map[id]={};if(voteVal!=='SKIP')map[id][voter]=voteVal});return map}
function getItemStatus(it){var vm=getVoteMap(),votes=vm[it.id]||{},vals=Object.values(votes).filter(function(v){return v==='YES'||v==='NO'});if(!vals.length)return{status:'pending',yes:0,no:0,total:0,pct:0};var yes=vals.filter(function(v){return v==='YES'}).length,pct=Math.round(yes/vals.length*100);return{status:pct>=CONFIG.THRESHOLD_GO?'go':pct>=CONFIG.THRESHOLD_DISCUSS?'discuss':'archive',yes:yes,no:vals.length-yes,total:vals.length,pct:pct}}
function hasUserVoted(id){var user=document.getElementById('nameSelect').value;if(!user)return false;var votedLocally=Object.values(localVotes).some(function(wv){return wv&&wv[id]});if(votedLocally)return true;return allVotes.some(function(v){return v.itemId===id&&v.voter===user})}
function buildVoteQueue(){cardQueue=allItems.filter(function(it){return!hasUserVoted(it.id)})}

/* ── VOTE VIEW ── */
function renderVoteView(){
  var c=document.getElementById('voteInner'),items=getWeekItems();
  if(!items.length){
    var n=allItems.length;
    if(loadError){c.innerHTML='<div class="center-msg"><div class="center-icon">\u26a0\ufe0f</div><div class="center-eyebrow">Load failed</div><div class="center-ttl">Could not read captures</div><div class="center-sub" style="color:#c0392b;font-size:12px;margin-top:8px">'+esc(loadError)+'</div><div class="center-sub" style="margin-top:8px">Tap &#8635; to retry.</div></div>'}
    else if(n>0){var b=getWeekBounds(weekOffset),s=allItems[0],p=parseDate(s?s.id||s.saveDate:''),ps=p&&!isNaN(p)?p.toISOString():'?';c.innerHTML='<div class="center-msg"><div class="center-icon">\ud83d\udcc5</div><div class="center-eyebrow">Wrong week?</div><div class="center-ttl">'+n+' capture'+(n!==1?'s':'')+' loaded &mdash; none this week</div><div class="center-sub">Showing '+fmtShort(b.mon)+' &ndash; '+fmtShort(b.sun)+'.<br>Use &larr; to go back, or &#8635; to refresh.</div><div class="center-sub" style="font-size:10px;margin-top:10px;color:#a9bdb6">First item id: '+esc(s?s.id:'')+' &rarr; '+ps+'</div></div>'}
    else{c.innerHTML='<div class="center-msg"><div class="center-icon">\ud83d\udcad</div><div class="center-eyebrow">Nothing yet</div><div class="center-ttl">No captures found</div><div class="center-sub">Add items in the capture app, then tap &#8635; to refresh.</div></div>'}
    return;
  }
  if(!cardQueue.length){var s2=getVoteSummary(items);c.innerHTML='<div class="all-done"><div style="font-size:48px;margin-bottom:4px">\u2713</div><div class="all-done-eyebrow">All done</div><div class="all-done-ttl">You\'ve voted on everything</div><div class="all-done-sub">'+items.length+' items &middot; '+s2.go+' Go &middot; '+s2.discuss+' Discuss &middot; '+s2.archive+' Archive</div><button class="btn-results" onclick="switchTab(\'results\')">See Results &rarr;</button></div>';return}
  var total=allItems.length,unvoted=cardQueue.length;
  c.innerHTML='<div class="vote-counter">'+unvoted+' of '+total+' to vote</div><div class="card-arena" id="cardArena"><div class="card-stack" id="cardStack"></div></div><div class="vote-btns"><button class="vbtn vbtn-no" onclick="vote(\'NO\')">\ud83d\udc4e</button><button class="vbtn vbtn-skip" onclick="vote(\'SKIP\')">\u23ed</button><button class="vbtn vbtn-yes" onclick="vote(\'YES\')">\ud83d\udc4d</button></div>';
  buildCardStack();
}

function buildCardStack(){var s=document.getElementById('cardStack');if(!s)return;s.innerHTML='';cardQueue.slice(0,3).forEach(function(it,i){var card=createSwipeCard(it);card.classList.add(i===0?'top':i===1?'behind-1':'behind-2');s.appendChild(card)});var top=s.querySelector('.top');if(top)attachSwipe(top)}

function createSwipeCard(it){
  var div=document.createElement('div');div.className='swipe-card';div.dataset.itemId=it.id;
  var d=parseDate(it.saveDate||it.id),ds=isNaN(d)?'':fmtShort(d);
  var hasImg=!!it.imageUrl;
  div.innerHTML=
    (hasImg?'<img class="sc-img" src="'+escA(it.imageUrl)+'" alt="" onclick="event.stopPropagation();openLightbox(this.src)" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">':'')+
    '<div class="sc-img-ph" style="'+(hasImg?'display:none':'')+'">\ud83d\uddbc</div>'+
    '<div class="sc-body'+(hasImg?' has-img':'')+'">' +
      '<div class="sc-note">'+esc(it.note)+'</div>'+
      '<div class="sc-meta"><span class="sc-who">'+esc(it.savedBy)+'</span><span class="sc-date">'+ds+'</span></div>'+
      (it.sourceUrl?'<a class="sc-link" href="'+escA(it.sourceUrl)+'" target="_blank" rel="noopener">View Source &#8599;</a>':'')+
    '</div>'+
    '<div class="ov-yes">\u2713</div><div class="ov-no">\u2715</div>';
  return div;
}

/* ── SWIPE ── */
function attachSwipe(card){card.addEventListener('touchstart',onTS,{passive:true});card.addEventListener('touchmove',onTM,{passive:false});card.addEventListener('touchend',onTE);card.addEventListener('touchcancel',onTE);card.addEventListener('mousedown',onMD)}
function onTS(e){swipeState={active:true,startX:e.touches[0].clientX,startY:e.touches[0].clientY,curX:0,curY:0}}
function onTM(e){if(!swipeState.active)return;e.preventDefault();swipeState.curX=e.touches[0].clientX-swipeState.startX;swipeState.curY=e.touches[0].clientY-swipeState.startY;moveCard(e.currentTarget,swipeState.curX,swipeState.curY)}
function onTE(e){if(!swipeState.active)return;swipeState.active=false;endSwipe(e.currentTarget,swipeState.curX)}
var _md=false;
function onMD(e){_md=true;swipeState={active:true,startX:e.clientX,startY:e.clientY,curX:0,curY:0};var mm=function(ev){if(!_md)return;swipeState.curX=ev.clientX-swipeState.startX;moveCard(e.currentTarget,swipeState.curX,ev.clientY-swipeState.startY)};var mu=function(){if(!_md)return;_md=false;endSwipe(e.currentTarget,swipeState.curX);document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu)}
function moveCard(card,dx,dy){card.style.transform='translateX('+dx+'px) translateY('+(dy*.25)+'px) rotate('+(dx*.07)+'deg)';var T=25,yes=card.querySelector('.ov-yes'),no=card.querySelector('.ov-no');if(dx>T){yes.style.opacity=Math.min((dx-T)/65,.8);no.style.opacity=0}else if(dx<-T){no.style.opacity=Math.min((-dx-T)/65,.8);yes.style.opacity=0}else{yes.style.opacity=no.style.opacity=0}}
function endSwipe(card,dx){if(Math.abs(dx)>=SWIPE_THRESHOLD){animateOut(card,dx>0?'right':'left');vote(dx>0?'YES':'NO',false)}else{card.style.transition='transform .35s cubic-bezier(.34,1.56,.64,1)';card.style.transform='';card.querySelector('.ov-yes').style.opacity=0;card.querySelector('.ov-no').style.opacity=0;setTimeout(function(){card.style.transition=''},350)}}
function animateOut(card,dir){card.style.transition='transform .38s ease-in,opacity .38s ease-in';card.style.transform='translateX('+(dir==='right'?'160%':'-160%')+') rotate('+(dir==='right'?28:-28)+'deg)';card.style.opacity='0'}

/* ── VOTE LOGIC ── */
function vote(v,animate){
  if(animate===undefined)animate=true;
  var user=document.getElementById('nameSelect').value;
  if(!user){toast('Select your name first');return}
  var item=cardQueue[0];if(!item)return;
  var itemDate=parseDate(item.saveDate||item.id);
  var week=(!isNaN(itemDate)&&itemDate>new Date(0))?getISOWeek(itemDate):getWeekBounds(weekOffset).week;
  if(!localVotes[week])localVotes[week]={};
  localVotes[week][item.id]={vote:v,voter:user};
  localStorage.setItem('pavoi_votes',JSON.stringify(localVotes));
  if(animate&&v!=='SKIP'){var tc=document.querySelector('#cardStack .top');if(tc){tc.querySelector('.ov-yes').style.opacity=v==='YES'?.7:0;tc.querySelector('.ov-no').style.opacity=v==='NO'?.7:0;animateOut(tc,v==='YES'?'right':'left')}}
  if(v!=='SKIP')submitVote(user,item.id,v,week);
  cardQueue.shift();
  setTimeout(function(){buildVoteQueue();renderVoteView();updateBadges();renderResultsGrid()},animate?320:0);
}
function submitVote(voter,itemId,v,week){
  google.script.run.withSuccessHandler(function(){}).withFailureHandler(function(e){console.warn('Vote submit failed (saved locally):',e)}).submitVote(voter,itemId,v,week);
}

/* ── RESULTS ── */
function setFilter(f){activeFilter=f;document.querySelectorAll('.sub-tab').forEach(function(b){b.classList.toggle('active',b.dataset.filter===f)});renderResultsGrid()}
function renderResultsGrid(){
  var grid=document.getElementById('resultsGrid');if(!grid)return;
  var items=getWeekItems(),vm=getVoteMap();
  var filtered=activeFilter==='all'?items:items.filter(function(it){return getItemStatus(it).status===activeFilter});
  if(!filtered.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px 16px"><div style="font-size:32px;opacity:.4;margin-bottom:10px">\ud83d\udcad</div><div style="font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#a9bdb6">No items here</div></div>';return}
  grid.innerHTML=filtered.map(function(it){
    var s=getItemStatus(it),votes=vm[it.id]||{},bt=s.status==='go'?'Go':s.status==='discuss'?'Discuss':s.status==='archive'?'Archive':'Pending';
    var dots=CONFIG.TEAM.map(function(n){var v=votes[n];return'<span class="vote-dot '+(v==='YES'?'yes':v==='NO'?'no':'empty')+'" title="'+esc(n)+': '+(v||'&mdash;')+'"></span>'}).join('');
    /* Image area: photo if available, otherwise branded text card */
    var imgArea=it.imageUrl
      ?'<div class="rc-img-box"><img class="rc-img" src="'+escA(it.imageUrl)+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="rc-img-ph" style="display:none">\ud83d\uddbc</div></div>'
      :'<div class="rc-img-box text-card"><div class="rc-text-note"><span>'+esc(it.note)+'</span></div></div>';
    return'<div class="result-card" onclick="openModal(\''+escA(it.id)+'\')">'
      +imgArea
      +'<div class="rc-body"><div class="rc-note">'+esc(it.note)+'</div><div class="rc-who">'+esc(it.savedBy)+'</div><div class="rc-votes">'+dots+'<span class="rc-pct">'+(s.total?s.pct+'%':'')+'</span></div></div></div>';
  }).join('');
}
function openModal(itemId){
  var it=allItems.find(function(x){return x.id===itemId});if(!it)return;
  var s=getItemStatus(it),votes=getVoteMap()[itemId]||{},bt=s.status==='go'?'Go':s.status==='discuss'?'Discuss':s.status==='archive'?'Archive':'Pending';
  var d=parseDate(it.saveDate||it.id),ds=isNaN(d)?'':fmtDate(d);
  document.getElementById('modalContent').innerHTML=
    (it.imageUrl?'<img class="modal-img" src="'+escA(it.imageUrl)+'" alt="" onclick="openLightbox(this.src)">':'')+
    '<span class="modal-badge rc-badge badge-'+s.status+'">'+bt+'</span>'+
    '<div class="modal-note">'+esc(it.note)+'</div>'+
    '<div class="modal-meta">By '+esc(it.savedBy)+' &middot; '+ds+(it.sourceUrl?' &middot; <a href="'+escA(it.sourceUrl)+'" target="_blank" rel="noopener">View Source &#8599;</a>':'')+'</div>'+
    '<div class="modal-votes-ttl">Team Votes &middot; '+s.yes+'/'+s.total+' Yes ('+s.pct+'%)</div>'+
    '<div class="modal-bar"><div class="modal-bar-fill" style="width:'+s.pct+'%"></div></div>'+
    '<div style="margin-top:14px">'+CONFIG.TEAM.map(function(n){var v=votes[n];return'<div class="vote-row"><span class="vote-name">'+esc(n)+'</span><span class="vote-val '+(v==='YES'?'yes':v==='NO'?'no':'empty')+'">'+(v||'&mdash;')+'</span></div>'}).join('')+'</div>';
  document.getElementById('modalBg').classList.add('on');
}
function openLightbox(src){if(!src)return;document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('on')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('on');document.getElementById('lightboxImg').src=''}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox()});
function closeModal(e){if(e.target===document.getElementById('modalBg'))document.getElementById('modalBg').classList.remove('on')}
function updateBadges(){var items=getWeekItems(),rem=items.filter(function(it){return!hasUserVoted(it.id)}).length;document.getElementById('voteBadge').textContent=rem;document.getElementById('resultsBadge').textContent=items.length}
function getVoteSummary(items){var c={go:0,discuss:0,archive:0,pending:0};items.forEach(function(it){c[getItemStatus(it).status]++});return c}
function switchTab(tab){['vote','results'].forEach(function(t){var cap=t[0].toUpperCase()+t.slice(1);document.getElementById('view'+cap).classList.toggle('active',t===tab);document.getElementById('tab'+cap).classList.toggle('active',t===tab)});document.querySelector('.week-bar').classList.toggle('hidden',tab==='vote')}

/* ── EXPORTS ── */
function exportSlack(){var b=getWeekBounds(weekOffset),items=getWeekItems(),go=items.filter(function(it){return getItemStatus(it).status==='go'}),discuss=items.filter(function(it){return getItemStatus(it).status==='discuss'}),archive=items.filter(function(it){return getItemStatus(it).status==='archive'});var fi=function(it){var s=getItemStatus(it);return'\u2022 "'+it.note+'" \u2014 _'+it.savedBy+'_ _('+s.pct+'%, '+s.total+' votes)_'+(it.sourceUrl?' | <'+it.sourceUrl+'|Source>':'')+(it.imageUrl?' | <'+it.imageUrl+'|Img>':'')};var msg='*PAVOI INSPIRE DIGEST \xb7 '+fmtShort(b.mon).toUpperCase()+' \u2013 '+fmtShort(b.sun).toUpperCase()+', '+b.mon.getFullYear()+'*\n_'+b.week+' \xb7 '+items.length+' captures_\n\n';if(go.length)msg+='\u2713 *GO* \u2014 '+go.length+' item'+(go.length>1?'s':'')+'\n'+go.map(fi).join('\n')+'\n\n';if(discuss.length)msg+='\u2197 *DISCUSS* \u2014 '+discuss.length+' item'+(discuss.length>1?'s':'')+'\n'+discuss.map(fi).join('\n')+'\n\n';if(archive.length)msg+='\u2014 *ARCHIVE* \u2014 '+archive.length+' item'+(archive.length>1?'s':'')+'\n'+archive.map(fi).join('\n');copyText(msg,'Slack digest copied')}
function exportFigma(){var b=getWeekBounds(weekOffset),items=getWeekItems(),mi=function(it){var s=getItemStatus(it);return{id:it.id,note:it.note,saved_by:it.savedBy,image_url:it.imageUrl,source_url:it.sourceUrl,status:s.status.toUpperCase(),yes_pct:s.pct,total_votes:s.total}};var p={pavoi_inspire_digest:{week:b.week,period:fmtDate(b.mon)+' \u2013 '+fmtDate(b.sun),generated:new Date().toISOString(),total_captures:items.length,voters:CONFIG.TEAM,go_items:items.filter(function(it){return getItemStatus(it).status==='go'}).map(mi),discuss_items:items.filter(function(it){return getItemStatus(it).status==='discuss'}).map(mi),archive_items:items.filter(function(it){return getItemStatus(it).status==='archive'}).map(mi),pending_items:items.filter(function(it){return getItemStatus(it).status==='pending'}).map(mi)}};var blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='pavoi-inspire-'+b.week+'.json';a.click();URL.revokeObjectURL(url);flash('Figma JSON downloaded')}
function exportClaudePrompt(){var b=getWeekBounds(weekOffset),items=getWeekItems(),go=items.filter(function(it){return getItemStatus(it).status==='go'}),discuss=items.filter(function(it){return getItemStatus(it).status==='discuss'});var rep=function(c,n){var s='';for(var i=0;i<n;i++)s+=c;return s};var p='PAVOI INSPIRE \u2014 TREND ANALYSIS BRIEF\nWeek: '+b.week+' ('+fmtShort(b.mon)+'\u2013'+fmtShort(b.sun)+', '+b.mon.getFullYear()+')\n'+rep('\u2550',60)+'\n\nYou are a product and trend strategist for PAVOI, a premium DTC jewelry brand. The team of '+CONFIG.TEAM.length+' ('+CONFIG.TEAM.map(function(n){return n.split(' ')[0]}).join(', ')+') captured and blind-voted on '+items.length+' inspiration items this week.\n\nTASK:\n1. Identify the top 3\u20135 emerging trends in the GO + DISCUSS items\n2. Flag competitive threats or fast-moving opportunities\n3. Suggest 2\u20133 specific product concepts or SKU directions\n4. Surface marketing angles visible in what the team is saving\n5. Note what PAVOI should be watching that isn\'t captured here\n\nOUTPUT: Trends \u2192 Opportunities \u2192 Product Ideas \u2192 Marketing Angles \u2192 Watch List\n\n'+rep('\u2500',60)+'\n\n';var fi2=function(items2,label,pct){p+=label+' ('+items2.length+') \u2014 '+pct+':\n\n';items2.forEach(function(it,i){var s=getItemStatus(it);p+=(i+1)+'. "'+it.note+'"\n   By: '+it.savedBy+'\n';if(it.sourceUrl)p+='   Source: '+it.sourceUrl+'\n';if(it.imageUrl)p+='   Image: '+it.imageUrl+'\n';p+='   Votes: '+s.yes+' YES / '+s.no+' NO ('+s.pct+'%)\n\n'})};if(go.length)fi2(go,'GO ITEMS',CONFIG.THRESHOLD_GO+'%+ team yes');if(discuss.length)fi2(discuss,'DISCUSS ITEMS',CONFIG.THRESHOLD_DISCUSS+'\u2013'+(CONFIG.THRESHOLD_GO-1)+'% yes');p+=rep('\u2500',60)+'\nTotal: '+items.length+' captures | '+go.length+' Go | '+discuss.length+' Discuss | '+items.filter(function(it){return getItemStatus(it).status==='archive'}).length+' Archive\n';copyText(p,'Claude prompt copied')}

function copyText(t,m){try{navigator.clipboard.writeText(t).then(function(){flash(m)}).catch(function(){fb(t,m)})}catch(e){fb(t,m)}}
function fb(t,m){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);flash(m)}
function flash(m){var el=document.getElementById('copyFlash');el.textContent=m.toUpperCase();el.classList.add('on');clearTimeout(_copyFlashTimer);_copyFlashTimer=setTimeout(function(){el.classList.remove('on')},2500)}
function toast(m){var el=document.getElementById('toast');el.textContent=m.toUpperCase();el.classList.add('on');clearTimeout(_toastTimer);_toastTimer=setTimeout(function(){el.classList.remove('on')},3000)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escA(s){return esc(s)}

init();
</script>
